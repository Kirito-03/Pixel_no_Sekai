version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: netflix_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netflix_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-bd_netflix}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      # Persistencia de datos
      - postgres_data:/var/lib/postgresql/data
      # Auto-inicialización del schema en primer inicio
      - ./server/bd_netflix_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - netflix_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-bd_netflix}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Node.js Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: netflix_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Database config
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-netflix_dev_pass}
      DB_NAME: ${DB_NAME:-bd_netflix}
      # Server config
      PORT: 3001
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      # APIs externas (desde .env)
      TMDB_API_KEY: ${TMDB_API_KEY}
      TRANSLATE_PROVIDER: ${TRANSLATE_PROVIDER:-libre}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
    volumes:
      # Hot reload en development (HABILITADO temporalmente para CORS proxy)
      - ./server:/app
      # Anonymous volume para node_modules (evita conflictos con host)
      # - /app/node_modules
      # Persistencia de uploads
      - ./server/uploads:/app/uploads
      # Persistencia de videos/hls
      - ./server/videos:/app/videos
      - ./server/hls:/app/hls
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netflix_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Adminer - DB Management UI
  adminer:
    image: adminer:latest
    container_name: netflix_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - postgres
    networks:
      - netflix_network

  # Redis (OPCIONAL - para futuro caching)
  # Descomentar cuando se implemente caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: netflix_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - netflix_network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

# Volumes para persistencia
volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local

# Red interna para comunicación entre servicios
networks:
  netflix_network:
    driver: bridge
